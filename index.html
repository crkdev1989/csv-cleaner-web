<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Cleaner | CRK Dev</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="tool-page">
  <header class="tool-header">
    <div class="tool-shell tool-header-inner">
      <a href="https://crkdev.com" class="tool-logo-link">
        <img src="assets/logo.png" alt="CRK Dev logo" class="tool-logo" />
      </a>

      <nav class="tool-nav">
        <a href="https://crkdev.com">Home</a>
        <a href="https://crkdev.com/portfolio">Portfolio</a>
        <a href="https://crkdev.com/hire-me" class="tool-nav-cta">Hire Me</a>
      </nav>
    </div>
  </header>

  <main class="tool-shell tool-main">
    <section class="tool-hero">
      <h1>CSV Cleaner</h1>
      <p class="tool-subhead">
        Upload messy CSV or Excel data and clean it instantly using CRK Dev presets.
      </p>
    </section>

    <section class="tool-card tool-stats-card">
      <div class="tool-stats-grid">
        <div class="tool-stat">
          <div id="files-cleaned-count" class="tool-stat-number">0</div>
          <div class="tool-stat-label">Files Cleaned</div>
        </div>

        <div class="tool-stat">
          <div id="rows-processed-count" class="tool-stat-number">0</div>
          <div class="tool-stat-label">Rows Processed</div>
        </div>
      </div>
    </section>

    <section class="tool-card">
      <h2 class="tool-card-title">Clean Your Dataset</h2>

      <form id="clean-form">
        <div class="tool-form-group">
          <label for="file">Upload File</label>
          <input type="file" id="file" name="file" accept=".csv,.xlsx" required />
        </div>

        <div class="tool-form-group">
          <label for="preset">Preset</label>
          <select id="preset" name="preset">
            <option value="leads">Leads</option>
            <option value="crm">CRM</option>
            <option value="scrape">Scrape</option>
          </select>
        </div>

        <button type="submit" class="tool-button">Clean File</button>
      </form>

      <div id="status" class="tool-status">Status: Ready</div>
    </section>

    <section id="results" class="tool-results">
      <div class="tool-card">
        <h2 class="tool-card-title">Results</h2>

        <div id="summary"></div>

        <div class="tool-downloads">
          <a id="download-cleaned" href="#" target="_blank" rel="noopener noreferrer">Download Cleaned File</a>
          <a id="download-report" href="#" target="_blank" rel="noopener noreferrer">Download Report</a>
          <a id="download-summary" href="#" target="_blank" rel="noopener noreferrer">Download Summary</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="tool-footer">
    <div class="tool-shell tool-footer-inner">
      <div>© CRK Dev</div>
      <div class="tool-footer-links">
        <a href="https://crkdev.com">Website</a>
        <a href="https://github.com/crkdev1989">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
