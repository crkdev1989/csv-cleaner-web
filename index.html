<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV Cleaner | CRK Dev</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="site-header">
  <img src="assets/logo.png" class="logo">
  <span class="brand">CRK Dev</span>
</header>

<main class="container">

<h1>CSV Cleaner</h1>

<p class="subtitle">
Upload a messy CSV or Excel file and clean it instantly using preset pipelines.
</p>

<form id="clean-form">

<div class="form-group">
<label>Upload File</label>
<input type="file" id="file" accept=".csv,.xlsx" required>
</div>

<div class="form-group">
<label>Preset</label>
<select id="preset">

<option value="leads">Leads</option>
<option value="crm">CRM</option>
<option value="scrape">Scrape</option>

</select>
</div>

<button type="submit">Clean File</button>

</form>

<div id="status" class="status">
Status: Ready
</div>

<div id="results" class="results">

<h3>Results</h3>

<div id="summary"></div>

<div class="downloads">

<a id="download-cleaned" href="#" target="_blank">Download Cleaned File</a>

<a id="download-report" href="#" target="_blank">Download Report</a>

<a id="download-summary" href="#" target="_blank">Download Summary</a>

</div>

</div>

</main>

<footer>

CRK Dev • Data Tools

</footer>

<script src="app.js"></script>

</body>
</html>
