```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Cleaner | CRK Dev</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
    padding:0;
}

.container{
    max-width:700px;
    margin:80px auto;
    background:#1e293b;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
    margin-top:0;
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="file"],
select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.status{
    margin-top:20px;
    padding:12px;
    background:#020617;
    border-radius:6px;
    font-size:14px;
}

.results{
    margin-top:30px;
    display:none;
}

.downloads a{
    display:block;
    margin-top:10px;
    color:#60a5fa;
    text-decoration:none;
}

.downloads a:hover{
    text-decoration:underline;
}

footer{
    text-align:center;
    margin-top:40px;
    font-size:12px;
    color:#64748b;
}
</style>
</head>

<body>

<div class="container">

<h1>CSV Cleaner</h1>

<p class="subtitle">
Upload a messy CSV or Excel file, choose a preset, and download a cleaned dataset.
</p>

<form id="clean-form">

<div class="form-group">
<label for="file">Upload File</label>
<input type="file" id="file" name="file" accept=".csv,.xlsx" required>
</div>

<div class="form-group">
<label for="preset">Preset</label>
<select id="preset" name="preset">
<option value="leads">Leads (contacts data)</option>
<option value="crm">CRM (phone + zip + state)</option>
<option value="scrape">Scrape (general scraped data)</option>
</select>
</div>

<button type="submit">Clean File</button>

</form>

<div class="status" id="status">
Status: Ready
</div>

<div class="results" id="results">

<h3>Results</h3>

<div id="summary"></div>

<div class="downloads">

<a id="download-cleaned" href="#" target="_blank">
Download Cleaned File
</a>

<a id="download-report" href="#" target="_blank">
Download Report
</a>

<a id="download-summary" href="#" target="_blank">
Download Summary
</a>

</div>

</div>

<footer>
CRK Dev • CSV Cleaner
</footer>

</div>

</body>
</html>
