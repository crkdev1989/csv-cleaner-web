<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Cleaner | CRK Dev</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>CSV Cleaner</h1>

    <p class="subtitle">
      Upload a messy CSV or Excel file, choose a preset, and download a cleaned dataset.
    </p>

    <form id="clean-form">
      <div class="form-group">
        <label for="file">Upload File</label>
        <input type="file" id="file" name="file" accept=".csv,.xlsx" required />
      </div>

      <div class="form-group">
        <label for="preset">Preset</label>
        <select id="preset" name="preset">
          <option value="leads">Leads (contacts data)</option>
          <option value="crm">CRM (phone + zip + state)</option>
          <option value="scrape">Scrape (general scraped data)</option>
        </select>
      </div>

      <button type="submit">Clean File</button>
    </form>

    <div class="status" id="status">
      Status: Ready
    </div>

    <div class="results" id="results">
      <h3>Results</h3>

      <div id="summary"></div>

      <div class="downloads">
        <a id="download-cleaned" href="#" target="_blank" rel="noopener noreferrer">
          Download Cleaned File
        </a>

        <a id="download-report" href="#" target="_blank" rel="noopener noreferrer">
          Download Report
        </a>

        <a id="download-summary" href="#" target="_blank" rel="noopener noreferrer">
          Download Summary
        </a>
      </div>
    </div>

    <footer>
      CRK Dev • CSV Cleaner
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
